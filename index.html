<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi ramo especial 🌻</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2b4c7c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Times New Roman', serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: #87CEEB;
            cursor: pointer;
        }

        h1 {
            margin-top: 15px;
            color: #c44569;
            font-size: 1.8rem;
        }

        .mensaje {
            margin-top: 10px;
            color: #e66767;
            font-weight: bold;
            font-size: 1.1rem;
        }

        button {
            margin-top: 15px;
            background: #c44569;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
            margin: 5px;
        }

        button:hover {
            transform: scale(1.05);
        }

        .footer {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>

        // ============================================================

        let imagenActual = new Image();
        let imagenCargada = false;

        function dibujarImagenEnCanvas() {
            if (!imagenCargada) return;
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(imagenActual, 0, 0, width, height);
        }

        function cargarImagen() {
            imagenActual.onload = () => {
                imagenCargada = true;
                dibujarImagenEnCanvas();
            };
            imagenActual.onerror = () => {
                console.error("Error al cargar la imagen en Base64. Revisa el código.");
                ctx.fillStyle = "#87CEEB";
                ctx.fillRect(0, 0, width, height);
                ctx.font = "bold 20px 'Segoe UI'";
                ctx.fillStyle = "#c44569";
                ctx.textAlign = "center";
                ctx.fillText("⚠️ No se pudo cargar la imagen", width/2, height/2);
                ctx.fillText("Verifica el código Base64", width/2, height/2 + 40);
                imagenCargada = false;
            };
            imagenActual.src = miImagenBase64;
        }

        // Si la variable Base64 está vacía, mostrar mensaje de error
        if (!miImagenBase64 || miImagenBase64.trim() === "" || miImagenBase64 === "data:image/jpeg;base64, /9j/4AAQSkZJRgABAQAAAQABAAD/2wBD...") {
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, width, height);
            ctx.font = "bold 20px 'Segoe UI'";
            ctx.fillStyle = "#c44569";
            ctx.textAlign = "center";
            ctx.fillText("🌸 Reemplaza el código Base64", width/2, height/2);
            ctx.fillText("con el de tu imagen favorita 🌸", width/2, height/2 + 40);
            imagenCargada = false;
        } else {
            cargarImagen();
        }

        // Botón para recargar (reinicia la misma imagen)
        document.getElementById('btnRedibujar').addEventListener('click', () => {
            if (imagenCargada) {
                // Forzar recarga limpiando y volviendo a cargar
                imagenActual.src = "";
                imagenActual.src = miImagenBase64;
                document.getElementById('mensaje').innerHTML = '💖 Toca el ramo para una sorpresa 💖';
            }
        });

        // Botón para guardar el canvas como PNG
        document.getElementById('btnDescargar').addEventListener('click', () => {
            if (!imagenCargada) {
                alert("Aún no se ha cargado la imagen correctamente.");
                return;
            }
            const link = document.createElement('a');
            link.download = 'mi_ramo_cumpleaños.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        // Sorpresa: confeti y mensaje al hacer clic en el canvas
        let animacionActiva = false;
        canvas.addEventListener('click', () => {
            if (!imagenCargada) {
                alert("La imagen no está lista. Espera un momento o recarga.");
                return;
            }
            if (animacionActiva) return;
            animacionActiva = true;
            const msgDiv = document.getElementById('mensaje');
            msgDiv.innerHTML = '✨ ¡Pétalos de felicidad para ti! ¡Te quiero mucho! ✨';
            
            const emojis = ['🌸', '🌼', '🌻', '🌺', '🪷', '💐', '✨'];
            for (let i = 0; i < 50; i++) {
                const div = document.createElement('div');
                div.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                div.style.position = 'fixed';
                div.style.left = Math.random() * window.innerWidth + 'px';
                div.style.top = '-40px';
                div.style.fontSize = (18 + Math.random() * 28) + 'px';
                div.style.opacity = '0.9';
                div.style.pointerEvents = 'none';
                div.style.zIndex = '9999';
                div.style.transition = 'all 3s ease-out';
                document.body.appendChild(div);
                setTimeout(() => {
                    div.style.top = window.innerHeight + 'px';
                    div.style.transform = `rotate(${Math.random() * 360}deg)`;
                    div.style.opacity = '0';
                }, 10);
                setTimeout(() => div.remove(), 3200);
            }
            setTimeout(() => {
                msgDiv.innerHTML = '💝 ¡Que sigas tan bella y hermosa todos los dias! 💝';
                animacionActiva = false;
            }, 3000);
        });
    })();
